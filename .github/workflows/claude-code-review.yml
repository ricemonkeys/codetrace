name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Restrict automatic PR reviews to PRs opened by the project's known
    # collaborators so that fork PRs from outside contributors do not consume
    # our subscription/API quota.
    if: |
      github.event.pull_request.user.login == 'jinsh1210' ||
      github.event.pull_request.user.login == 'jjk03' ||
      github.event.pull_request.user.login == '2sThisE' ||
      github.event.pull_request.user.login == 'babytazo'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            추가 지시: 항상 PR에 한국어로 GitHub Pull Request Review를 제출하라.
            본문에는 다음을 포함한다:
              - 한 줄 변경 요약
              - 잘 된 점 (있다면)
              - 우려되는 점 / 후속에서 챙기면 좋은 점 (있다면)
              - 검증 결과 (테스트/빌드 통과 여부, 직접 실행한 검증 항목)

            Review state 결정 규칙:
              - APPROVE: 다음을 모두 만족할 때
                  · 명백한 버그/회귀/보안 이슈 없음
                  · CI status check 모두 success 또는 skipped
                  · 코드 품질·테스트 커버리지·문서가 받아들일 만한 수준
                  · 의문이 있어도 후속 이슈로 남길 수 있는 수준이며 머지 가능
              - REQUEST_CHANGES: blocking 이슈가 있을 때
                  · 머지 전에 반드시 고쳐야 할 버그/회귀
                  · 보안/데이터 손실 위험
                  · 테스트나 빌드를 깨는 변경
                  · 합의되지 않은 destructive 변경
              - COMMENT: 위 둘에 해당하지 않을 때 (예: 정보성 의견만, 또는 판단 보류)

            self-approve 주의: 이 워크플로는 화이트리스트 collaborator의 PR에 자동 실행되며,
            APPROVE를 자동으로 부여한다. 팀이 사람 리뷰를 추가로 받기 원할 경우 GitHub
            branch protection rule에서 사람 리뷰 1명 필수를 설정해야 한다 (현재 정책에서는
            APPROVE 후 작성자 본인이 머지하는 흐름을 허용한다).
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

