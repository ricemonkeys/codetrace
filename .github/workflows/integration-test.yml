name: Integration Tests

on:
  pull_request:
    branches: [develop]

jobs:
  detect-language:
    runs-on: ubuntu-latest
    outputs:
      java: ${{ steps.detect.outputs.java }}
      node: ${{ steps.detect.outputs.node }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect languages
        id: detect
        run: |
          echo "java=$(test -f backend/build.gradle || test -f build.gradle || test -f pom.xml && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "node=$(test -f package.json || test -f frontend/package.json && echo true || echo false)" >> $GITHUB_OUTPUT

  java-integration-test:
    needs: detect-language
    if: needs.detect-language.outputs.java == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Run integration tests
        working-directory: backend
        run: ./gradlew test --tests "*IntegrationTest*" --tests "*IT" --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Test Results
          path: backend/build/test-results/test/*.xml
          reporter: java-junit
          fail-on-error: false

  node-integration-test:
    needs: detect-language
    if: needs.detect-language.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run integration tests
        working-directory: frontend
        run: npx jest --testPathPattern="integration|\.int\." --coverage || true

  comment-results:
    needs: [java-integration-test, node-integration-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const java = '${{ needs.java-integration-test.result }}';
            const node = '${{ needs.node-integration-test.result }}';

            const status = (r) => r === 'success' ? '✓ Pass' : r === 'skipped' ? '— Skipped' : '✗ Fail';

            const body = [
              '## Integration Test Results',
              '',
              '| Target | Status |',
              '|--------|--------|',
              `| Java/Spring | ${status(java)} |`,
              `| Node/TS | ${status(node)} |`,
              '',
              `Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
