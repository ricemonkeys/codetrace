name: Unit Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [develop, main]

jobs:
  detect-language:
    runs-on: ubuntu-latest
    outputs:
      java: ${{ steps.detect.outputs.java }}
      node: ${{ steps.detect.outputs.node }}
      swift: ${{ steps.detect.outputs.swift }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect languages
        id: detect
        run: |
          echo "java=$(test -f backend/build.gradle || test -f build.gradle || test -f pom.xml && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "node=$(test -f package.json || test -f frontend/package.json && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "swift=$(test -f Package.swift && echo true || echo false)" >> $GITHUB_OUTPUT

  java-unit-test:
    needs: detect-language
    if: needs.detect-language.outputs.java == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Run unit tests
        working-directory: backend
        run: ./gradlew test jacocoTestReport --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: java-coverage-report
          path: backend/build/reports/jacoco/test/html/

      - name: Coverage summary
        if: always()
        working-directory: backend
        run: |
          REPORT="build/reports/jacoco/test/jacocoTestReport.xml"
          if [ -f "$REPORT" ]; then
            COVERED=$(grep -oP 'type="INSTRUCTION"[^/]*/>' "$REPORT" | grep -oP 'covered="\K[0-9]+' | awk '{s+=$1}END{print s}')
            MISSED=$(grep -oP 'type="INSTRUCTION"[^/]*/>' "$REPORT" | grep -oP 'missed="\K[0-9]+' | awk '{s+=$1}END{print s}')
            TOTAL=$((COVERED + MISSED))
            if [ "$TOTAL" -gt 0 ]; then
              PCT=$(awk "BEGIN{printf \"%.1f\", $COVERED/$TOTAL*100}")
              echo "### Coverage: ${PCT}% ($COVERED/$TOTAL instructions)" >> $GITHUB_STEP_SUMMARY
              if (( $(echo "$PCT < 80" | bc -l) )) && [ "$TOTAL" -gt 0 ]; then
                echo "Coverage is below 80% — review required" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "### Coverage: No test files found yet" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  node-unit-test:
    needs: detect-language
    if: needs.detect-language.outputs.node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm test --workspace=frontend -- --coverage --coverageReporters=text --coverageReporters=lcov --runInBand

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: node-coverage-report
          path: frontend/coverage/

      - name: Run extension tests
        run: xvfb-run -a npm test --workspace=extension

  swift-unit-test:
    needs: detect-language
    if: needs.detect-language.outputs.swift == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Swift tests
        run: swift test --enable-code-coverage

      - name: Coverage summary
        run: |
          xcrun llvm-cov report .build/debug/*.xctest -instr-profile .build/debug/codecov/default.profdata 2>/dev/null || true
